version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consultaall-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
